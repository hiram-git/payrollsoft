<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src *; img-src 'self' data:;" />
    <title>RCG SOFTRIX</title>
    <style>
      :root {
        --ink: #0b1f3a;
        --fore: #e6e9ef;
        --mute: rgba(230, 233, 239, 0.7);
        --rule: rgba(230, 233, 239, 0.18);
        --err: #f59ba0;
        --ok: #fff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; font-family: 'Inter Tight', system-ui, -apple-system, Segoe UI, sans-serif; background: var(--ink); color: var(--fore); }
      main { height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { width: min(28rem, 100%); text-align: center; }
      .brand {
        display: inline-flex; align-items: center; justify-content: center;
        width: 72px; height: 72px;
        background: #fff; border-radius: 10px; padding: 7px;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
        margin-bottom: 1.25rem;
      }
      .brand img { width: 100%; height: 100%; object-fit: contain; display: block; }
      h1 { font-weight: 600; font-size: 1.05rem; margin: 0 0 0.5rem; letter-spacing: 0.01em; }
      p { margin: 0; font-size: 0.92rem; line-height: 1.5; }
      .mute { color: var(--mute); }
      .target { margin-top: 0.85rem; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 0.78rem; color: var(--mute); word-break: break-all; }
      .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--rule); border-top-color: var(--fore); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -3px; margin-right: 0.5rem; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .actions { margin-top: 1.5rem; display: none; gap: 0.5rem; justify-content: center; }
      .actions.show { display: inline-flex; }
      button { font: inherit; color: var(--fore); background: transparent; border: 1px solid var(--rule); padding: 0.55rem 1.1rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
      button:hover { background: rgba(230, 233, 239, 0.08); }
      button.primary { background: var(--fore); color: var(--ink); border-color: var(--fore); }
      button.primary:hover { background: #fff; }
      .err { color: var(--err); }
      [hidden] { display: none !important; }

      /* Config form */
      .config-form { margin-top: 1.1rem; text-align: left; }
      .config-form label { display: block; font-size: 0.78rem; letter-spacing: 0.02em; color: var(--mute); text-transform: uppercase; margin-bottom: 0.35rem; }
      .config-form input[type="url"] {
        width: 100%;
        font: inherit;
        font-size: 0.95rem;
        font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
        color: var(--fore);
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid var(--rule);
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }
      .config-form input[type="url"]:focus { border-color: var(--fore); background: rgba(0, 0, 0, 0.28); }
      .config-form .form-error { color: var(--err); font-size: 0.85rem; margin-top: 0.5rem; }
      .config-form .form-actions { margin-top: 1.1rem; display: flex; gap: 0.5rem; justify-content: flex-end; }
    </style>
  </head>
  <body>
    <main>
      <div class="card" role="status" aria-live="polite">
        <div class="brand"><img src="brand/rcg-mark.png" alt="RCG SOFTRIX" /></div>

        <!-- Connecting view -->
        <div id="connecting-view">
          <h1 id="title">RCG SOFTRIX</h1>
          <p id="message"><span class="spinner"></span><span class="mute">Conectando con el servidor…</span></p>
          <p class="target" id="target"></p>
          <div class="actions" id="actions">
            <button class="primary" id="retry">Reintentar</button>
            <button id="change">Cambiar servidor</button>
            <button id="quit">Salir</button>
          </div>
        </div>

        <!-- Config view -->
        <div id="config-view" hidden>
          <h1 id="config-title">Configurar servidor</h1>
          <p class="mute" id="config-help">Indica la URL del servidor RCG SOFTRIX al que se conectará esta aplicación.</p>
          <form class="config-form" id="config-form" autocomplete="off">
            <label for="url-input">URL del servidor</label>
            <input
              type="url"
              id="url-input"
              placeholder="https://payroll.tu-empresa.com"
              required
              autofocus
              spellcheck="false"
            />
            <p class="form-error" id="config-error" hidden></p>
            <div class="form-actions">
              <button type="button" id="config-cancel" hidden>Cancelar</button>
              <button type="submit" class="primary" id="config-submit">Guardar y conectar</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script>
      const invoke = window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke
        ? window.__TAURI_INTERNALS__.invoke.bind(window.__TAURI_INTERNALS__)
        : null

      const params = new URLSearchParams(location.search)
      const isConfigWindow = params.get('config') === '1'

      const connectingView = document.getElementById('connecting-view')
      const configView = document.getElementById('config-view')
      const titleEl = document.getElementById('title')
      const messageEl = document.getElementById('message')
      const targetEl = document.getElementById('target')
      const actionsEl = document.getElementById('actions')
      const retryBtn = document.getElementById('retry')
      const changeBtn = document.getElementById('change')
      const quitBtn = document.getElementById('quit')

      const configHelp = document.getElementById('config-help')
      const configTitle = document.getElementById('config-title')
      const configForm = document.getElementById('config-form')
      const configError = document.getElementById('config-error')
      const configCancel = document.getElementById('config-cancel')
      const configSubmit = document.getElementById('config-submit')
      const urlInput = document.getElementById('url-input')

      async function fetchCurrentUrl() {
        if (!invoke) return ''
        try {
          return (await invoke('current_url')) || ''
        } catch {
          return ''
        }
      }

      function showConnecting() {
        connectingView.hidden = false
        configView.hidden = true
        titleEl.textContent = 'RCG SOFTRIX'
        messageEl.innerHTML = '<span class="spinner"></span><span class="mute">Conectando con el servidor…</span>'
        actionsEl.classList.remove('show')
      }

      function showConnectError(detail) {
        titleEl.textContent = 'No se pudo conectar'
        messageEl.innerHTML =
          '<span class="err">' + detail + '</span><br>' +
          '<span class="mute">Verifica que el servidor esté corriendo y que la URL sea correcta.</span>'
        actionsEl.classList.add('show')
      }

      function showConfig(currentUrl, opts) {
        opts = opts || {}
        connectingView.hidden = true
        configView.hidden = false
        configError.hidden = true
        urlInput.value = currentUrl || ''
        configCancel.hidden = !isConfigWindow
        if (isConfigWindow) {
          configTitle.textContent = 'Cambiar servidor'
          configHelp.textContent = 'Cambia la URL del servidor al que se conecta esta aplicación.'
        } else if (currentUrl) {
          configTitle.textContent = 'Cambiar servidor'
          configHelp.textContent = 'Cambia la URL del servidor al que se conecta esta aplicación.'
        } else {
          configTitle.textContent = 'Configurar servidor'
          configHelp.textContent = 'Primera ejecución: indica la URL del servidor RCG SOFTRIX.'
        }
        urlInput.focus()
        urlInput.select()
      }

      function showFormError(msg) {
        configError.textContent = msg
        configError.hidden = false
      }

      async function attempt(url) {
        showConnecting()
        targetEl.textContent = url
        try {
          const controller = new AbortController()
          const timeout = setTimeout(() => controller.abort(), 6000)
          await fetch(url, { mode: 'no-cors', cache: 'no-store', signal: controller.signal })
          clearTimeout(timeout)
          window.location.replace(url)
        } catch (e) {
          const detail = e && e.name === 'AbortError'
            ? 'El servidor no respondió en 6 segundos.'
            : 'No se pudo establecer conexión con el servidor.'
          showConnectError(detail)
        }
      }

      async function init() {
        const currentUrl = await fetchCurrentUrl()

        if (isConfigWindow) {
          showConfig(currentUrl)
          return
        }

        if (!currentUrl) {
          showConfig('')
          return
        }

        attempt(currentUrl)
      }

      retryBtn.addEventListener('click', async () => {
        const url = await fetchCurrentUrl()
        if (url) attempt(url)
      })

      changeBtn.addEventListener('click', async () => {
        const url = await fetchCurrentUrl()
        showConfig(url)
      })

      quitBtn.addEventListener('click', () => {
        if (invoke) invoke('quit_app').catch(() => window.close())
        else window.close()
      })

      configCancel.addEventListener('click', () => {
        if (invoke) invoke('close_config_window').catch(() => window.close())
        else window.close()
      })

      configForm.addEventListener('submit', async (e) => {
        e.preventDefault()
        configError.hidden = true
        const url = urlInput.value.trim()
        if (!url) {
          showFormError('Ingresa una URL.')
          return
        }
        if (!invoke) {
          showFormError('Tauri no disponible.')
          return
        }
        configSubmit.disabled = true
        try {
          await invoke('save_desktop_url', { url })
        } catch (err) {
          configSubmit.disabled = false
          showFormError(String(err))
          return
        }
        if (isConfigWindow) {
          try {
            await invoke('apply_url', { url })
          } catch (err) {
            configSubmit.disabled = false
            showFormError(String(err))
            return
          }
          invoke('close_config_window').catch(() => window.close())
        } else {
          // First-run / main-window flow: navigate ourselves to the saved URL.
          window.location.replace(url)
        }
      })

      init()
    </script>
  </body>
</html>
