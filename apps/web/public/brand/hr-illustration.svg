<svg viewBox="0 0 600 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recursos Humanos, Planillas y Asistencia">
  <defs>
    <linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D27F"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- ░░ Planilla / payslip ░░ -->
  <g>
    <rect x="48" y="70" width="270" height="300" rx="16" fill="#FFFFFF" fill-opacity="0.05" stroke="#AEB9C9" stroke-width="2"/>
    <!-- header -->
    <rect x="72" y="98" width="150" height="16" rx="8" fill="url(#g-green)"/>
    <rect x="72" y="124" width="100" height="10" rx="5" fill="#AEB9C9" fill-opacity="0.55"/>
    <!-- líneas de conceptos -->
    <g fill="#AEB9C9" fill-opacity="0.45">
      <rect x="72" y="160" width="222" height="9" rx="4.5"/>
      <rect x="72" y="184" width="222" height="9" rx="4.5"/>
      <rect x="72" y="208" width="222" height="9" rx="4.5"/>
      <rect x="72" y="232" width="160" height="9" rx="4.5"/>
    </g>
    <!-- montos -->
    <g fill="#34D27F" fill-opacity="0.85">
      <rect x="250" y="160" width="44" height="9" rx="4.5"/>
      <rect x="250" y="184" width="44" height="9" rx="4.5"/>
      <rect x="250" y="208" width="44" height="9" rx="4.5"/>
    </g>
    <!-- total -->
    <line x1="72" y1="268" x2="294" y2="268" stroke="#AEB9C9" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="92" cy="300" r="22" fill="url(#g-green)"/>
    <text x="92" y="308" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#06210F" text-anchor="middle">$</text>
    <rect x="128" y="290" width="120" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="128" y="312" width="80" height="9" rx="4.5" fill="#AEB9C9" fill-opacity="0.55"/>
  </g>

  <!-- ░░ Asistencia / reloj ░░ -->
  <g>
    <circle cx="468" cy="132" r="66" fill="#0A1628" stroke="url(#g-green)" stroke-width="6"/>
    <circle cx="468" cy="132" r="50" fill="none" stroke="#AEB9C9" stroke-width="1.5" stroke-opacity="0.4"/>
    <g stroke="#AEB9CB" stroke-width="3" stroke-linecap="round">
      <line x1="468" y1="132" x2="468" y2="98"/>
      <line x1="468" y1="132" x2="498" y2="146"/>
    </g>
    <circle cx="468" cy="132" r="5" fill="#34D27F"/>
    <!-- ticks -->
    <g stroke="#34D27F" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9">
      <line x1="468" y1="74" x2="468" y2="84"/>
      <line x1="468" y1="180" x2="468" y2="190"/>
      <line x1="410" y1="132" x2="420" y2="132"/>
      <line x1="516" y1="132" x2="526" y2="132"/>
    </g>
    <!-- check de marcación -->
    <circle cx="520" cy="180" r="22" fill="url(#g-green)"/>
    <path d="M510 180 l7 7 l13 -15" stroke="#06210F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ░░ Recursos Humanos / equipo ░░ -->
  <g transform="translate(360,250)">
    <!-- persona destacada -->
    <g transform="translate(70,0)">
      <circle cx="40" cy="40" r="26" fill="url(#g-green)"/>
      <path d="M2 132 a38 38 0 0 1 76 0 z" fill="url(#g-green)"/>
    </g>
    <!-- persona izquierda -->
    <g opacity="0.85">
      <circle cx="36" cy="54" r="22" fill="none" stroke="#AEB9C9" stroke-width="3"/>
      <path d="M4 132 a32 32 0 0 1 64 0 z" fill="none" stroke="#AEB9C9" stroke-width="3"/>
    </g>
    <!-- persona derecha -->
    <g opacity="0.85" transform="translate(150,0)">
      <circle cx="36" cy="54" r="22" fill="none" stroke="#AEB9C9" stroke-width="3"/>
      <path d="M4 132 a32 32 0 0 1 64 0 z" fill="none" stroke="#AEB9C9" stroke-width="3"/>
    </g>
  </g>

  <!-- ░░ Cálculo / barras ░░ -->
  <g transform="translate(60,300)" stroke-linecap="round">
    <line x1="0" y1="70" x2="120" y2="70" stroke="#AEB9C9" stroke-width="2" stroke-opacity="0.5"/>
    <rect x="6" y="44" width="18" height="26" rx="4" fill="#AEB9C9" fill-opacity="0.45"/>
    <rect x="36" y="30" width="18" height="40" rx="4" fill="#AEB9C9" fill-opacity="0.45"/>
    <rect x="66" y="14" width="18" height="56" rx="4" fill="url(#g-green)"/>
    <rect x="96" y="36" width="18" height="34" rx="4" fill="#AEB9C9" fill-opacity="0.45"/>
  </g>
</svg>
